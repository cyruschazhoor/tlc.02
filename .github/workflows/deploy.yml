name: Build and deploy a container to an Azure Web App

on:
  push:
    branches: [ main ]

# 1. Ensure permissions are at the top level so the deploy job can use OIDC tokens
permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull the codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Authenticate with Azure
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3. Authenticate with Docker Registry
      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build & Push Production Image
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/learning-collective-app:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/learning-collective-app:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/learning-collective-app:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/learning-collective-app:latest

      # 5. Continuous Deployment to Azure Container Apps
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.ACR_NAME }}
          resourceGroup: learning-collective-rg
          containerAppName: learning-collective-web
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/learning-collective-app:${{ github.sha }}
          targetPort: 80
          ingress: external
          containerAppEnvironment: learning-collective-env
          # Environment variables mapped securely at runtime
          environmentVariables: |
            DATABASE_URL=postgresql://cloudadmin:YourSecurePassword123!@learning-collective-db.postgres.database.azure.com:5432/postgres?sslmode=require
            NODE_ENV=production
