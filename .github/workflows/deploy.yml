name: Build and deploy a container to an Azure Web App

on:
  push:
    branches: [ main ]

# 1. Ensure permissions are at the top level so the deploy job can use OIDC tokens
permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build # Makes sure deploy only runs after build finishes successfully
    
    steps:
      # =========================================================================
      # METHOD A: AZURE LOGIN (OIDC / Federated Credentials)
      # To use this, you must set up an App Registration in Microsoft Entra ID,
      # configure Federated Credentials for GitHub, assign it a Contributor/Owner
      # role on your Web App, and add the three AZURE_* secrets to your GitHub repo.
      # =========================================================================
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Now the deploy action will use the credentials established in the login step
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'learningcollective-app' # Replace with your actual Azure App name if different
          images: 'ghcr.io/${{ github.repository }}:latest'

      # =========================================================================
      # METHOD B (ALTERNATIVE & RECOMMENDED): AZURE PUBLISH PROFILE
      # If you get "No credentials found" or OIDC permission/role assignment issues,
      # use a Publish Profile. It's much simpler, more secure, and extremely reliable.
      #
      # To use Method B instead:
      # 1. Comment out/remove the "Azure Login" and "Deploy" steps above (Method A).
      # 2. Go to your Azure Web App -> Overview -> Click "Get publish profile" -> Copy XML content.
      # 3. Add a GitHub secret called AZURE_WEBAPP_PUBLISH_PROFILE with the XML content.
      # 4. Uncomment the step below:
      # =========================================================================
      # - name: Deploy to Azure Web App (Publish Profile)
      #   uses: azure/webapps-deploy@v3
      #   with:
      #     app-name: 'learningcollective-app'
      #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      #     images: 'ghcr.io/${{ github.repository }}:latest'
